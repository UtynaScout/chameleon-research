name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: rust-core
        run: cargo build --release

      - name: Run tests
        working-directory: rust-core
        run: cargo test

      - name: Check warnings
        working-directory: rust-core
        run: cargo build --release 2>&1

      - name: Generate docs
        working-directory: rust-core
        run: cargo doc --no-deps

      - name: Verify examples
        working-directory: rust-core
        run: |
          cargo run --example server -- --help
          cargo run --example client -- --help

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('rust-core/Cargo.lock') }}

      - name: Run benchmarks
        working-directory: rust-core
        run: cargo bench

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports
          path: rust-core/target/criterion
          retention-days: 30

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        working-directory: rust-core
        run: cargo build --release

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp rust-core/target/release/chameleon-core dist/
          cp rust-core/target/release/examples/server dist/netsynth-server
          cp rust-core/target/release/examples/client dist/netsynth-client
          cp README.md CHANGELOG.md dist/
          tar -czf netsynth-${{ github.ref_name }}-linux-x64.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: netsynth-*.tar.gz
          generate_release_notes: true
